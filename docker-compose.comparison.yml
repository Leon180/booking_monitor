# D12.5 — 4-stage architecture comparison harness
#
# Brings up 4 stage binaries (Stage 1: sync SELECT FOR UPDATE through
# Stage 4: Pattern A + saga compensator) on ports 8091-8094 alongside
# bench-isolated Postgres + Redis + (Stage-4-only) Kafka. The harness
# orchestration script `scripts/run_4stage_comparison.sh` (Slice 3)
# drives the per-stage k6 runs; Slice 1 (this file) only stands up
# the infrastructure.
#
# All bench services use NON-DEFAULT host ports to avoid colliding
# with the production stack in `docker-compose.yml`:
#   Postgres   5433 prod → 5434 bench
#   Redis      6379 prod → 6380 bench
#   Kafka      9092 prod → 9093 bench
#   Prometheus 9090 prod → 9091 bench
#   Stage 4    8080 prod → 8091-8094 bench (4 stages)
#
# Bring up:
#   make bench-up
# Tear down:
#   make bench-down       # keeps volumes
#   make bench-down-clean # also removes volumes

services:
  # ─── Bench-isolated backing services ───────────────────────
  postgres-bench:
    image: postgres:15-alpine
    container_name: booking_bench_pg
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: bench_pg_local
      POSTGRES_DB: booking
    volumes:
      # Slice 0's init script creates the 4 booking_stage* DBs on
      # first volume init. Reused verbatim from main compose's
      # eventual init scope; the script is idempotent so re-runs are
      # safe (see deploy/postgres/init/02_create_stage_dbs.sql for
      # rationale + idempotency proof).
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    command: -c 'max_connections=1000'
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "booking"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-bench:
    image: redis:7-alpine
    container_name: booking_bench_redis
    ports:
      - "6380:6379"
    command:
      - redis-server
      - --requirepass
      - bench_redis_local
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "bench_redis_local", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Kafka + Zookeeper — Stage 4 only. Stages 1-3 don't wire any
  # Kafka client in their fx graph (see plan §1) so they ignore
  # this service entirely.
  zookeeper-bench:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: booking_bench_zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # `ruok` is not whitelisted in cp-zookeeper:7.6 by default; the
      # image's allow-list is just `srvr`. Either whitelist `ruok`
      # via 4LW_WHITELIST or use `srvr` (which IS whitelisted) — we
      # use `srvr` because it's a valid liveness probe + needs no
      # config gymnastics.
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-bench:
    image: confluentinc/cp-kafka:7.6.0
    container_name: booking_bench_kafka
    ports:
      # 9093 is taken by booking_alertmanager in the production stack;
      # 19092 chosen to stay clear of all common Kafka host ports
      # (9092 prod kafka, 9093 alertmanager, 9094 cp-kafka tutorials).
      # This is the host-mapped port; intra-compose Stage 4 still uses
      # `kafka-bench:9092` (container-internal).
      - "19092:29093"
    depends_on:
      zookeeper-bench:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-bench:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-bench:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  prometheus-bench:
    image: prom/prometheus:v2.54.1
    container_name: booking_bench_prometheus
    ports:
      - "9091:9090"
    volumes:
      # Slice 2 wires the actual scrape config with stage labels.
      # Slice 1 ships a minimal file that scrapes Prometheus itself
      # so the container at least comes up healthy.
      - ./deploy/prometheus/prometheus.comparison.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Stage binaries 1-4 ─────────────────────────────────────
  # Each builds from a different cmd/ target via the BUILD_TARGET
  # ARG (Dockerfile change in this slice). Each container's
  # internal listen port is 8080 (binary default); host-mapped per
  # stage to 8091-8094.

  booking-cli-stage1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: ./cmd/booking-cli-stage1
    container_name: booking_bench_stage1
    command: ["/app/booking-cli", "server"]
    ports:
      - "8091:8080"
    depends_on:
      postgres-bench:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://booking:bench_pg_local@postgres-bench:5432/booking_stage1?sslmode=disable
      # Stage 1 has no Redis path — the binary's fx graph never wires
      # a Redis client. We still provide REDIS_ADDR with the bench
      # service so cleanenv's required-field guard (if any future
      # change adds one) doesn't bite; the connection is never opened.
      REDIS_ADDR: redis-bench:6379
      REDIS_PASSWORD: bench_redis_local
      PORT: "8080"
      ENABLE_TEST_ENDPOINTS: "true"
      OTEL_SERVICE_VERSION: stage1-sync-select-for-update
      BOOKING_RESERVATION_WINDOW: 20s
      EXPIRY_SWEEP_INTERVAL: 5s
      EXPIRY_GRACE_PERIOD: 1s

  booking-cli-stage2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: ./cmd/booking-cli-stage2
    container_name: booking_bench_stage2
    command: ["/app/booking-cli", "server"]
    ports:
      - "8092:8080"
    depends_on:
      postgres-bench:
        condition: service_healthy
      redis-bench:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://booking:bench_pg_local@postgres-bench:5432/booking_stage2?sslmode=disable
      REDIS_ADDR: redis-bench:6379
      REDIS_PASSWORD: bench_redis_local
      REDIS_DB: "1"
      PORT: "8080"
      ENABLE_TEST_ENDPOINTS: "true"
      OTEL_SERVICE_VERSION: stage2-redis-lua-sync-pg
      BOOKING_RESERVATION_WINDOW: 20s
      EXPIRY_SWEEP_INTERVAL: 5s
      EXPIRY_GRACE_PERIOD: 1s

  booking-cli-stage3:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: ./cmd/booking-cli-stage3
    container_name: booking_bench_stage3
    command: ["/app/booking-cli", "server"]
    ports:
      - "8093:8080"
    depends_on:
      postgres-bench:
        condition: service_healthy
      redis-bench:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://booking:bench_pg_local@postgres-bench:5432/booking_stage3?sslmode=disable
      REDIS_ADDR: redis-bench:6379
      REDIS_PASSWORD: bench_redis_local
      REDIS_DB: "2"
      PORT: "8080"
      ENABLE_TEST_ENDPOINTS: "true"
      OTEL_SERVICE_VERSION: stage3-redis-lua-stream-async
      BOOKING_RESERVATION_WINDOW: 20s
      EXPIRY_SWEEP_INTERVAL: 5s
      EXPIRY_GRACE_PERIOD: 1s

  # ⚠️ Stage 4 = `cmd/booking-cli` (the current production binary).
  # There is NO `cmd/booking-cli-stage4/` directory; the compose
  # service is named "booking-cli-stage4" only for symmetry with
  # stages 1-3 in scrape-target labels (Slice 2's Prometheus config
  # tags this service with `stage=stage4`).
  booking-cli-stage4:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TARGET: ./cmd/booking-cli
    container_name: booking_bench_stage4
    command: ["/app/booking-cli", "server"]
    ports:
      - "8094:8080"
    depends_on:
      postgres-bench:
        condition: service_healthy
      redis-bench:
        condition: service_healthy
      kafka-bench:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://booking:bench_pg_local@postgres-bench:5432/booking_stage4?sslmode=disable
      REDIS_ADDR: redis-bench:6379
      REDIS_PASSWORD: bench_redis_local
      REDIS_DB: "3"
      KAFKA_BROKERS: kafka-bench:9092
      PORT: "8080"
      ENABLE_TEST_ENDPOINTS: "true"
      PAYMENT_WEBHOOK_SECRET: bench_webhook_secret
      OTEL_SERVICE_VERSION: stage4-pattern-a-with-saga
      BOOKING_RESERVATION_WINDOW: 20s
      EXPIRY_SWEEP_INTERVAL: 5s
      EXPIRY_GRACE_PERIOD: 1s
