# Alertmanager configuration for booking_monitor.
#
# Why Alertmanager (not just Prometheus rule firing): Prometheus
# evaluates rules and decides "alert is firing", but it does NOT
# deliver. Alertmanager handles deduplication, grouping, throttling,
# silencing, and routing to delivery targets (Slack / PagerDuty /
# email / generic webhook). Without it, an operator only sees alerts
# in the Prometheus UI's Alerts tab — no push notification.
#
# Default delivery (CHANGED 2026-05-02): a webhook receiver pointing
# at a sidecar that logs every payload to stdout. This means alerts
# DO leave Alertmanager by default — operators can see them via
# `docker logs booking_alert_logger`. Previously the default was a
# `null` receiver which dedupe / group / silence inside the AM UI but
# never pushed outbound; the senior-review checkpoint
# (docs/checkpoints/20260501-senior-multi-agent-review.md, Critical
# #1) flagged this as a real operability gap because production-bound
# compose stacks inherited the dev-only no-op as their de-facto
# delivery config.
#
# To wire Slack delivery (replaces or complements the webhook-logger):
#   1. Create an Incoming Webhook in Slack (App Directory → Incoming
#      Webhooks). The URL has the shape
#      https://hooks.slack.com/services/T.../B.../...
#   2. Copy alertmanager.slack.yml.example over this file (or merge
#      the slack receiver block from it).
#   3. Paste the webhook URL into the `slack_configs[0].api_url`
#      field. Alertmanager does NOT expand env vars in this YAML;
#      either edit the file in place or pre-process via envsubst /
#      gomplate before mounting.
#   4. `docker compose restart alertmanager prometheus`.
#
# Why webhook-logger and not just a publishing-disabled receiver:
# Alertmanager has no built-in "log to stdout" receiver. The webhook
# receiver type is the canonical AM delivery escape hatch — points at
# any HTTP service that accepts the AM webhook payload. Our sidecar
# is a 1-line `mendhak/http-https-echo` image that prints the payload
# to its container logs. Cheap, self-contained, no real secrets
# required; visible alerts in dev without standing up a real Slack
# workspace.

global:
  # resolve_timeout: how long Alertmanager waits without seeing a
  # "still firing" signal before declaring an alert resolved. Lower =
  # faster recovery notification, but risks spurious "resolved" pings
  # during scrape blips.
  resolve_timeout: 5m

# templates: leave empty by default. Webhook + slack text rendered
# with the default templates (annotation summary + description). Add
# a template file here if/when alert text needs custom formatting.
templates: []

route:
  # Top-level (catch-all) route. All alerts hit here first. Default
  # is the webhook-logger sidecar; alerts visible via
  # `docker logs booking_alert_logger`.
  receiver: webhook-logger

  # group_by — Alertmanager batches alerts that share these label
  # values into a single notification. Grouping by `alertname` +
  # `severity` keeps related alerts (e.g. all four Phase 2 O6 Redis-
  # infra alerts when Redis goes down) in one message rather than
  # spamming four. `cluster` would matter when we run >1 environment
  # but is omitted today since we only deploy one stack.
  group_by: ['alertname', 'severity']

  # group_wait — initial delay between firing and first notification.
  # Lets Alertmanager collect related alerts about to fire (e.g.
  # multiple Redis-infra alerts triggered by the same outage) into
  # one notification. 30s is the documented industry default.
  group_wait: 30s

  # group_interval — minimum time between two notifications for the
  # SAME group when new alerts get added. 5m means: if more alerts
  # join the group within 5m, they're held until the window expires;
  # outside the window, a new batched message is sent.
  group_interval: 5m

  # repeat_interval — how often to RE-NOTIFY a group that's still
  # firing. 4h means an unresolved alert won't spam every few minutes
  # but operators get a reminder if it persists overnight. Tune down
  # to 30m–1h for prod paging configurations; up to 24h for warning-
  # only rooms. Keep critical/warning/info distinct via the routes
  # below if you need different cadences per severity.
  repeat_interval: 4h

  # Routes table — branch on labels for severity-specific delivery.
  # All severities currently route to webhook-logger; future Slack /
  # PagerDuty differentiation only changes the receiver names per
  # branch.
  routes:
    - matchers:
        - severity = "critical"
      receiver: webhook-logger
      # Critical alerts cut group_wait so on-call sees them faster.
      group_wait: 10s
      # And shorter repeat so unresolved criticals nag every 30m
      # instead of 4h.
      repeat_interval: 30m
      continue: false

    - matchers:
        - severity = "warning"
      receiver: webhook-logger
      continue: false

    - matchers:
        - severity = "info"
      receiver: webhook-logger
      # Info alerts (e.g. InventorySoldOut) are dashboard-worthy but
      # don't deserve a 4-hourly repeat.
      repeat_interval: 24h
      continue: false

# Inhibition — when a higher-severity alert is firing, suppress
# related lower-severity alerts to reduce noise. Today: when
# RedisStreamCollectorDown is firing (critical: stream gauges are
# stale), suppress all stream-backlog alerts (Yellow / Orange / Red /
# ConsumerLag / DLQNonEmpty) because they're operating on stale data
# and would otherwise flap.
inhibit_rules:
  - source_matchers:
      - alertname = "RedisStreamCollectorDown"
    target_matchers:
      - alertname =~ "OrdersStreamBacklog(Yellow|Orange|Red)|OrdersStreamConsumerLag|OrdersDLQNonEmpty"
    # Inhibition only applies when these labels match between source
    # and target. equal: [] = "always inhibit when source fires" —
    # what we want since we don't run multi-cluster yet.
    equal: []

receivers:
  # `webhook-logger` — the dev/demo default since 2026-05-02. Posts
  # the Alertmanager webhook payload to a sidecar service
  # (`booking_alert_logger`) that prints the body to stdout. Operators
  # see fired alerts via `docker logs booking_alert_logger -f`.
  #
  # `send_resolved: true` so the operator also sees recovery events,
  # not just initial fires. Without this, a flapping alert produces
  # one "firing" log per cycle and silently goes quiet on resolve.
  - name: webhook-logger
    webhook_configs:
      - url: 'http://alert_logger:8080/'
        send_resolved: true
