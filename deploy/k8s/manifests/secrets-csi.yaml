# SecretProviderClass — declares which GCP Secret Manager secrets get
# pulled into pods that mount this. The Secrets Store CSI Driver +
# Google's "Secret Manager add-on for GKE" handle the actual fetch.
#
# Why CSI Driver over External Secrets Operator (ESO):
#   * Google's official recommendation for Autopilot v1.25+
#   * No copy in etcd — secrets live in Secret Manager + pod ephemeral
#     storage only (least exposure)
#   * Native Workload Identity integration via the booking-monitor SA
#
# The `secretObjects` block also creates a k8s Secret named
# `booking-monitor-secrets-synced` from the same data, so workloads
# can consume via the standard `envFrom` / `valueFrom: secretKeyRef`
# pattern. This is the "sync to k8s Secret" hybrid mode the docs cover
# at https://secrets-store-csi-driver.sigs.k8s.io/topics/sync-as-kubernetes-secret.html.
#
# REPLACE <PROJECT_ID> with your actual project ID before applying.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: booking-monitor-secrets
  namespace: booking-monitor
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/<PROJECT_ID>/secrets/database-url/versions/latest"
        path: "database-url"
      - resourceName: "projects/<PROJECT_ID>/secrets/redis-password/versions/latest"
        path: "redis-password"
      - resourceName: "projects/<PROJECT_ID>/secrets/payment-webhook-secret/versions/latest"
        path: "payment-webhook-secret"
      - resourceName: "projects/<PROJECT_ID>/secrets/stripe-api-key/versions/latest"
        path: "stripe-api-key"
      - resourceName: "projects/<PROJECT_ID>/secrets/stripe-webhook-secret/versions/latest"
        path: "stripe-webhook-secret"
  secretObjects:
    - secretName: booking-monitor-secrets-synced
      type: Opaque
      data:
        - objectName: database-url
          key: database-url
        - objectName: redis-password
          key: redis-password
        - objectName: payment-webhook-secret
          key: payment-webhook-secret
        - objectName: stripe-api-key
          key: stripe-api-key
        - objectName: stripe-webhook-secret
          key: stripe-webhook-secret
