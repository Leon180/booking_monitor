# Kubernetes ServiceAccount bound to GCP `sa-app-runtime` via
# Workload Identity. The `iam.gke.io/gcp-service-account` annotation
# is what triggers GKE's Workload Identity to map this k8s SA's pods'
# tokens onto the GCP SA's IAM. With this, the app can read Secret
# Manager without any explicit credential file or env var.
#
# Setup required (one-time, via runbook):
#   1. The GCP SA `sa-app-runtime` (created in PR 1's terraform) must
#      have the IAM role `roles/iam.workloadIdentityUser` granted to
#      principal: serviceAccount:<PROJECT_ID>.svc.id.goog[booking-monitor/booking-monitor]
#   2. The GKE cluster must have Workload Identity enabled
#      (`workload_identity_config { workload_pool = "<PROJECT_ID>.svc.id.goog" }`
#      in the terraform — handled in cluster.tf).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: booking-monitor
  namespace: booking-monitor
  annotations:
    # REPLACE <PROJECT_ID> with your actual project ID before applying.
    iam.gke.io/gcp-service-account: sa-app-runtime@<PROJECT_ID>.iam.gserviceaccount.com
