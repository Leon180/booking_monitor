# cloudflared as a k8s Deployment — replaces PR 4's systemd unit on
# the VM. Same Cloudflare Tunnel; the tunnel token gets configured
# via a k8s Secret (operator-provisioned, NOT stored in this manifest).
#
# Why a Deployment not a DaemonSet:
#   * DaemonSet = one cloudflared per node. With Autopilot we don't
#     control node count, and one pod per node is overkill for our
#     traffic.
#   * Deployment with replicas: 2 = HA on the SAME tunnel ID. Cloudflare
#     load-balances connections across cloudflared replicas internally.
#   * 2 replicas chosen for HA without overcommitting; can scale up
#     manually if traffic warrants.
#
# Routing: cloudflared connects to the tunnel + receives traffic from
# Cloudflare edge. Its config (Ingress) points to
# http://booking-monitor.booking-monitor.svc.cluster.local:8080 for
# the Service we declared in service.yaml.
#
# Token: cloudflared expects TUNNEL_TOKEN env var. The token comes from
# a k8s Secret named `cloudflared-tunnel-token`. The operator creates
# this Secret once via the runbook procedure (one-time tunnel-create
# step). The Secret is intentionally NOT stored as a SecretProviderClass
# entry — Cloudflare's tunnel token is "external" to GCP Secret
# Manager.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: booking-monitor
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: ingress
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/component: ingress
    spec:
      containers:
        - name: cloudflared
          # Pin by digest in a future PR for SLSA-style supply-chain
          # rigor. For now, use the official Cloudflare image at a
          # specific minor version.
          image: cloudflare/cloudflared:2026.5.0
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: token
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            failureThreshold: 1
            initialDelaySeconds: 10
            periodSeconds: 10
