# Redis Configuration for Booking Monitor

# Network
# Bind to all interfaces so the compose network can reach the container.
# Access is restricted by the REDIS_PASSWORD below, not by listener
# binding. If you deploy outside compose, put this behind a network
# policy / firewall that blocks the host port from the public net.
bind 0.0.0.0

# REQUIREPASS is intentionally NOT hardcoded here. The runtime password
# is injected via docker-compose.yml using `--requirepass ${REDIS_PASSWORD}`
# on the command line, which is how Redis's official image supports
# password configuration. Closes action-list item M16.
#
# If you run redis-server directly (e.g. host install), set:
#   requirepass <your password>
# below and rotate via redis-cli CONFIG SET.

# Persistence: AOF (Append Only File)
# We choose AOF for better durability than RDB.
appendonly yes
appendfilename "appendonly.aof"

# fsync policy: everysec
# This compromises between speed and safety.
# In a crash, we lose at most 1 second of data.
appendfsync everysec

# AOF Rewrite
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory Management
# If we run out of memory, stop accepting writes but allow reads.
maxmemory 512mb
maxmemory-policy noeviction
