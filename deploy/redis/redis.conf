# Redis Configuration for Booking Monitor
#
# Role in the system:
#   • Hot inventory (event:{id}:qty) — synchronous path of POST /api/v1/book
#   • Async order queue (Redis Streams: orders:stream, orders:dlq)
#   • Idempotency cache (24h TTL) for API + saga
#   • Saga retry counter (durable across consumer restarts)
#
# Redis is the HOT path, not the source of truth. Postgres is.
# This shapes every persistence choice below: we can tolerate a
# small Redis data loss window because the worker + saga
# double-check against Postgres will reconcile.

# ─── Network ─────────────────────────────────────────────────────
# Bind to all interfaces so the compose network can reach the
# container. Access is restricted by REDIS_PASSWORD below (--requirepass),
# not by listener binding. If you deploy outside compose, put this
# behind a network policy / firewall that blocks the host port from
# the public net.
bind 0.0.0.0

# ─── Authentication ──────────────────────────────────────────────
# REQUIREPASS is intentionally NOT hardcoded here. The runtime
# password is injected via docker-compose.yml using
# `--requirepass ${REDIS_PASSWORD}` on the command line, which is
# how Redis's official image supports password configuration.
# Closes action-list item M16.
#
# If you run redis-server directly (e.g. host install), set:
#   requirepass <your password>
# below and rotate via redis-cli CONFIG SET.

# ═══════════════════════════════════════════════════════════════
#  Persistence
# ═══════════════════════════════════════════════════════════════
#
# Redis has two persistence mechanisms:
#
#   RDB (snapshot)  — periodically dumps the entire memory image
#                     to disk. Fast to load, small files, but loses
#                     everything between snapshots on crash. Good
#                     for caches where data loss is acceptable.
#
#   AOF (log)       — appends every write command to a log file.
#                     Replays the log on restart. Larger files and
#                     slower restart, but much smaller data-loss
#                     window. Good for hot data we care about.
#
# Since Redis 4.0, AOF rewrites can use a "mixed" format that
# starts with an RDB snapshot prefix and appends AOF tail — giving
# AOF's durability with RDB's fast load time. Redis 7 defaults to
# this (`aof-use-rdb-preamble yes`), which we pin explicitly below
# so a downgrade doesn't silently revert to pure-AOF rewrites.

# ─── AOF enabled ─────────────────────────────────────────────────
# We need AOF because Redis holds hot inventory counts that must
# survive a crash (otherwise Redis and Postgres desync → potential
# overselling). RDB-only would lose the last few minutes of writes.
appendonly yes
appendfilename "appendonly.aof"

# ─── AOF-RDB hybrid rewrite format (Redis 4.0+, default on Redis 7) ─
# When AOF is rewritten, write an RDB snapshot prefix followed by
# an AOF tail. Shrinks file size AND speeds up restart (load RDB
# prefix fast, replay only the short tail).
aof-use-rdb-preamble yes

# ─── fsync policy: everysec ──────────────────────────────────────
# Redis has three fsync options. The trade-off is worst-case data
# loss vs. per-write latency cost:
#
#   always    — fsync on every write. Zero data loss on crash but
#               adds ~100-500μs SSD latency (or ~5-10ms HDD) to
#               every write. Unusable at 8k+ RPS — would push p95
#               from ~45ms to ~55ms+.
#
#   everysec  — fsync once per second via a background thread. The
#               main thread NEVER blocks on fsync in normal
#               operation. At most 1 second of writes lost on
#               crash. This is the industry default (Redis docs,
#               AWS ElastiCache, Twitter, Stack Overflow).
#
#   no        — never fsync explicitly; leave it to the OS page
#               cache flush (up to 30s on Linux). Fastest but
#               unsuitable for data we care about.
#
# We choose `everysec` because:
#   1. Redis is the hot path, Postgres is the source of truth. A
#      1s loss window is recoverable via saga + worker DB
#      double-check.
#   2. `always` would serialise every DECRBY behind a disk sync
#      with no durability gain over (1).
#   3. `no` breaks our "inventory must not silently desync"
#      invariant — 30s is too wide to reconcile.
appendfsync everysec

# ─── AOF rewrite thresholds ──────────────────────────────────────
# AOF grows forever as each write appends a line. Rewrite compacts
# it (SET k "a"; SET k "b"; SET k "c" → SET k "c"). Rewriting uses
# fork() so it doesn't block the main thread.
#
#   auto-aof-rewrite-percentage 100
#     Rewrite when AOF grows 100% larger than it was after the last
#     rewrite (i.e. doubled in size).
#
#   auto-aof-rewrite-min-size 64mb
#     But only if AOF is at least 64 MB — prevents thrashing on a
#     quiet server where doubling tiny files would rewrite
#     constantly.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ═══════════════════════════════════════════════════════════════
#  Memory Management
# ═══════════════════════════════════════════════════════════════

# ─── Memory ceiling ──────────────────────────────────────────────
# maxmemory caps total memory usage. 512 MB is generous for our
# workload (hot inventory + idempotency + stream) and leaves
# headroom in the container.
maxmemory 512mb

# ─── Eviction policy: noeviction ─────────────────────────────────
# When the cap is hit, what to do with new writes? Redis offers
# many eviction policies (allkeys-lru, volatile-lru, allkeys-lfu,
# volatile-ttl, random, noeviction, ...). We pick `noeviction`:
# reject writes with an error rather than drop keys.
#
# Rationale: if Redis evicts event:1:qty under pressure, we'd
# oversell the event silently. Better to fail the booking (which
# the saga / retry handles) than to silently corrupt inventory.
# Idempotency keys have explicit TTLs so they self-clean without
# needing LRU.
maxmemory-policy noeviction
