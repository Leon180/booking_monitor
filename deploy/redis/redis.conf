# Redis Configuration for Booking Monitor
#
# Role in the system:
#   • Hot inventory (event:{id}:qty) — synchronous path of POST /api/v1/book
#   • Async order queue (Redis Streams: orders:stream, orders:dlq)
#   • Idempotency cache (24h TTL) for API + saga
#   • Saga retry counter (durable across consumer restarts)
#
# Redis is the HOT path, not the source of truth. Postgres is.
# Cache state is reconstructible at any time via the rehydrate path
# at app startup (`cache.RehydrateInventory` →
# `installInventoryRehydrate` in cmd/booking-cli/server.go), so we
# treat Redis as ephemeral — no AOF, no RDB, no on-disk state.
# Industry consensus for this pattern: Alibaba 秒殺, Stripe, AWS
# ElastiCache, antirez. See `docs/architectural_backlog.md` §
# "Cache-truth architecture" for the full reasoning + 4-PR plan.

# ─── Network ─────────────────────────────────────────────────────
# Bind to all interfaces so the compose network can reach the
# container. Access is restricted by REDIS_PASSWORD below (--requirepass),
# not by listener binding. If you deploy outside compose, put this
# behind a network policy / firewall that blocks the host port from
# the public net.
bind 0.0.0.0

# ─── Authentication ──────────────────────────────────────────────
# REQUIREPASS is intentionally NOT hardcoded here. The runtime
# password is injected via docker-compose.yml using
# `--requirepass ${REDIS_PASSWORD}` on the command line, which is
# how Redis's official image supports password configuration.
# Closes action-list item M16.
#
# If you run redis-server directly (e.g. host install), set:
#   requirepass <your password>
# below and rotate via redis-cli CONFIG SET.

# ═══════════════════════════════════════════════════════════════
#  Persistence — DISABLED. Redis is ephemeral.
# ═══════════════════════════════════════════════════════════════
#
# Architectural stance: Postgres is the source of truth, Redis is the
# hot-path cache. Cache state is reconstructible via the app-startup
# rehydrate (cache.RehydrateInventory → installInventoryRehydrate),
# so neither AOF nor RDB is required. Industry pattern: Alibaba
# Apsara­DB for Redis flash sales doc; Stripe idempotency-key cache;
# AWS ElastiCache "data persistence configuration" recommends OFF
# when source-of-truth is elsewhere.
#
# What changed (was AOF + everysec fsync before):
#   1. Removed write amplification on every DECRBY in the booking
#      hot path.
#   2. Removed restart latency proportional to AOF size — restart
#      now scans Postgres events table once (<1s for typical event
#      counts), populates Redis via SETNX.
#   3. Removed AOF-rewrite operational complexity (fork() pressure
#      under high RPS, disk space management).
#
# Tradeoff accepted: a Redis crash loses in-flight stream messages
# (orders:stream entries that hadn't yet been consumed). Production
# operations should NOT FLUSHALL or otherwise destroy Redis state.
# `make reset-db` was updated in PR #73 to use precise DEL on cache
# keys without touching streams, so test cleanup never triggers
# this path. See `docs/architectural_backlog.md` for the future
# PR-C (NOGROUP self-heal alert) and PR-D (inventory drift recon).

# ─── AOF: OFF ────────────────────────────────────────────────────
# Cache state is not durable. App-startup rehydrate from Postgres
# replaces AOF as the recovery mechanism.
appendonly no

# ─── RDB: OFF ────────────────────────────────────────────────────
# `save ""` (empty quoted string) explicitly disables ALL snapshot
# rules. From the Redis 7 docs:
#   "It is also possible to remove all the previously configured
#    save points by adding a save directive with a single empty
#    string argument."
# Without this, Redis defaults to triggering RDB snapshots on
# changes-per-window thresholds, which we don't want.
save ""

# ═══════════════════════════════════════════════════════════════
#  Memory Management
# ═══════════════════════════════════════════════════════════════

# ─── Memory ceiling ──────────────────────────────────────────────
# maxmemory caps total memory usage. 512 MB is generous for our
# workload (hot inventory + idempotency + stream) and leaves
# headroom in the container.
maxmemory 512mb

# ─── Eviction policy: noeviction ─────────────────────────────────
# When the cap is hit, what to do with new writes? Redis offers
# many eviction policies (allkeys-lru, volatile-lru, allkeys-lfu,
# volatile-ttl, random, noeviction, ...). We pick `noeviction`:
# reject writes with an error rather than drop keys.
#
# Rationale: if Redis evicts event:1:qty under pressure, we'd
# oversell the event silently. Better to fail the booking (which
# the saga / retry handles) than to silently corrupt inventory.
# Idempotency keys have explicit TTLs so they self-clean without
# needing LRU.
maxmemory-policy noeviction
