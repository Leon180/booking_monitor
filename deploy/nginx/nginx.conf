# Nginx reverse proxy in front of the Go booking-cli server.
#
# Role:
#   • Public entry point (listen :80)
#   • Per-IP rate limiting on /api/ (leaky bucket, 100 r/s + burst 200)
#   • Keep-alive pool to the Go backend (avoids per-request TCP setup)
#   • Forwards real client IP headers so Go fairness metrics work
#   • Blocks public access to /metrics (Prometheus scrapes it
#     internally via the docker network, not through nginx)
#
# Why nginx and not APISIX / Kong / Traefik:
#   Our needs are a textbook L7 reverse proxy with rate limiting —
#   the exact job nginx was built for. APISIX/Kong add dynamic
#   routing, plugin ecosystems, and an etcd/DB dependency that are
#   worth it for 10+ services / API Gateway workloads, not a single
#   backend. We'd adopt APISIX (or k8s Ingress + Envoy) when we
#   reach that scale, not before.

events {
    # worker_connections — max concurrent connections each nginx
    # worker process can handle. Nginx uses a single-threaded event
    # loop per worker, so this is a soft ceiling on fd count. Nginx
    # auto-detects `worker_processes` = CPU count, so on a 4-core
    # machine the effective limit is 4 × 1024 = 4096. 1024 is the
    # safe default that doesn't need tuning `ulimit -n`.
    worker_connections 1024;
}

http {
    # Rate limit zone definition (applied by `limit_req` below).
    #
    #   $binary_remote_addr  — key by client IP in binary form
    #                          (4 B per IPv4 vs ~20 B for text;
    #                           matters when tracking 100k+ IPs).
    #   zone=booking:10m     — 10 MB shared memory for the counter
    #                          table; ~160k IPs fit before eviction.
    #   rate=100r/s          — sustained per-IP cap. With burst=200
    #                          and nodelay below, a fresh IP can
    #                          send 200 immediately then settle to
    #                          100/s.
    #
    # This line only DECLARES the zone. The `limit_req zone=booking`
    # inside the /api/ location is what actually activates it.
    limit_req_zone $binary_remote_addr zone=booking:10m rate=100r/s;

    # Upstream pool for the Go backend.
    # Upstream keepalive reduces TCP-connection churn: without it
    # every request opens a new TCP socket (3-way handshake, then
    # close), which is 2–3 RTTs of pure latency and a CPU cost at
    # 8k RPS. With keepalive, nginx holds up to 64 idle conns per
    # worker and reuses them for incoming requests.
    # Closes action-list item M14.
    upstream ticket_service {
        # `app` resolves to the booking-cli container via Docker
        # Compose DNS. If you rename the service in docker-compose,
        # update this too.
        server app:8080;

        # keepalive 64 — max idle upstream conns per worker. Good
        # starting point for a single backend; scale up (128–256)
        # if you multi-replica the backend.
        keepalive 64;
        # keepalive_timeout 65s — match Go's default IdleTimeout
        # (same 65s on both sides avoids races where one end closes
        # mid-request).
        keepalive_timeout 65s;
        # keepalive_requests 1000 — force-rotate each conn after
        # 1000 requests to shed any accumulated state/leaks.
        keepalive_requests 1000;
    }

    # Proxy timeouts — nginx's defaults are 60s each, which lets a
    # single slow backend pin a worker connection long enough that
    # a few hundred simultaneous slow requests can exhaust all
    # 4096 worker slots → legitimate traffic sees 503. Tight bounds
    # fail fast and reclaim workers. Closes action-list item M14.
    #
    #   proxy_connect_timeout — TCP handshake with upstream (5s).
    #   proxy_send_timeout    — idle between send ops to upstream (10s).
    #   proxy_read_timeout    — idle waiting for upstream response (15s).
    #
    # 15s > Go app's WriteTimeout=10s so nginx never times out
    # before the Go handler decides to give up itself.
    proxy_connect_timeout 5s;
    proxy_send_timeout    10s;
    proxy_read_timeout    15s;

    # HTTP/1.1 to upstream is REQUIRED for the keepalive block above
    # to work. Nginx's default `proxy_http_version` is 1.0, which
    # closes after every response — defeating the whole keepalive
    # pool. HTTP/1.1 sets `Connection: keep-alive` implicitly, but
    # nginx still injects `Connection: close` on the forwarded
    # request; `proxy_set_header Connection ""` erases that so the
    # keepalive sticks.
    #
    # Why not HTTP/2 upstream? H2 multiplexing is redundant inside
    # the data centre: nginx is already pooling connections, RTTs
    # between nginx and app are sub-ms, and many Go/nginx module
    # combos don't mix H2 upstream cleanly. H1.1 keepalive gives us
    # 95% of H2's benefit here with zero config surprises.
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    server {
        # listen 80 — bind port 80 on all network interfaces
        # (0.0.0.0:80). Running inside the nginx container, so
        # this only listens on the container's network. The host
        # maps to it via docker-compose `ports: "80:80"`.
        listen 80;

        # /api/ — the only publicly-rate-limited path. All real
        # traffic goes here.
        location /api/ {
            # limit_req parameters:
            #   zone=booking — use the zone declared above
            #   burst=200    — allow short bursts up to 200 queued
            #                  requests beyond the 100 r/s rate
            #   nodelay      — process burst requests immediately;
            #                  rejected (429) only when the 200-slot
            #                  bucket is full. Without nodelay, burst
            #                  requests are DELAYED in a queue, which
            #                  adds latency and is the wrong behaviour
            #                  for a ticketing flash sale.
            limit_req zone=booking burst=200 nodelay;

            # limit_req_status 429 — rejected requests return HTTP
            # 429 Too Many Requests (semantic match for rate limits).
            # Default is 503 Service Unavailable, which is misleading
            # because nginx isn't actually unavailable.
            limit_req_status 429;

            proxy_pass http://ticket_service;

            # Forward client identity to the Go backend. Without
            # these headers, the Go app only sees nginx's container
            # IP for every request → client-IP-based metrics and
            # fairness logic break.
            #
            #   Host              — preserve original Host header
            #                       (some routing uses it)
            #   X-Real-IP         — direct client IP
            #   X-Forwarded-For   — full proxy chain if we ever
            #                       sit behind another proxy
            #   X-Forwarded-Proto — http or https (for link
            #                       generation in the app)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /metrics — Prometheus metrics are scraped by Prometheus
        # over the internal docker network (prometheus → app:8080),
        # NOT through nginx. Exposing it publicly would leak
        # operational data (RPS, heap, GC pauses, error counts).
        # `deny all` returns 403 to any external request.
        location /metrics {
            # allow 172.16.0.0/12;   # (example) open up if
            #                        # Prometheus sits outside this
            #                        # compose stack.
            deny all;
        }

        # Fallback for anything else (e.g. health checks, legacy
        # paths). No rate limiting — these are either internal
        # or infrequent. The legacy POST /book route was removed
        # in action-list H9, so this mostly catches /health.
        location / {
            proxy_pass http://ticket_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
