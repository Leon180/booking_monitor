events {
    worker_connections 1024;
}

http {
    # Rate limiting zone: max 100 requests per second per IP address.
    # 10m allows storing ~160,000 IP addresses in the zone.
    limit_req_zone $binary_remote_addr zone=booking:10m rate=100r/s;

    # Upstream keepalive reduces TCP-connection churn to the Go backend.
    # `keepalive 64` keeps up to 64 idle connections per worker process.
    # `keepalive_timeout 65s` matches Go's default IdleTimeout.
    # Closes action-list item M14.
    upstream ticket_service {
        # Note: Docker Compose DNS resolves 'app' to the booking-cli container IP
        server app:8080;

        keepalive 64;
        keepalive_timeout 65s;
        keepalive_requests 1000;
    }

    # Bounded proxy timeouts — previously unset, which meant nginx
    # inherited the 60s upstream default. Tight bounds prevent a slow
    # backend from pinning nginx worker connections and also cut
    # slow-loris-from-upstream scenarios. Closes action-list item M14.
    proxy_connect_timeout 5s;
    proxy_send_timeout    10s;
    proxy_read_timeout    15s;

    # HTTP/1.1 upstream is required for the keepalive block above to
    # work; the default proxy uses HTTP/1.0 which closes after every
    # request.
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    server {
        listen 80;

        # Protect all API routes
        location /api/ {
            # Allow short bursts up to 200 requests.
            # nodelay means Nginx rejects excess requests immediately rather than delaying them.
            limit_req zone=booking burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://ticket_service;

            # Forward client IP headers so the Go backend Fairness Metrics work correctly.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Secure the Prometheus metrics endpoint to internal network only
        location /metrics {
            # allow 172.16.0.0/12; # Allow typical Docker bridge networks (if prometheus is outside this compose stack)
            deny all;              # Block public access
        }

        # Fallback for all other traffic (e.g., health checks).
        # The legacy POST /book route is gone (see action-list H9),
        # so this location is effectively for /health and the like.
        location / {
            proxy_pass http://ticket_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
