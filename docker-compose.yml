version: '3.8'

services:
  app:
    build: .
    container_name: booking_app
    command: [ "/app/booking-cli", "server" ]
    depends_on:
      - postgres
      - jaeger
      - kafka
      - redis
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:?OTEL_EXPORTER_OTLP_ENDPOINT is required}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:?OTEL_SERVICE_NAME is required}
      - REDIS_ADDR=${REDIS_ADDR:?REDIS_ADDR is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD-}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - KAFKA_BROKERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      - GIN_MODE=${GIN_MODE:-release}
      - APP_ENV=${APP_ENV:-production}

  nginx:
    image: nginx:1.27-alpine
    container_name: booking_nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  payment_worker:
    build: .
    container_name: booking_payment_worker
    command: [ "/app/booking-cli", "payment" ]
    depends_on:
      - postgres
      - kafka
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_ADDR=${REDIS_ADDR:?REDIS_ADDR is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD-}
      - KAFKA_BROKERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      - APP_NAME=booking_payment_worker

  postgres:
    image: postgres:15-alpine
    container_name: booking_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    command: -c 'max_connections=1000'

  redis:
    image: redis:7-alpine
    container_name: booking_redis
    ports:
      - "6379:6379"
    volumes:
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    # requirepass is passed as a command-line arg so the secret stays
    # in .env, never in the baked config file. The entrypoint still
    # loads redis.conf for persistence / memory settings.
    command:
      - "redis-server"
      - "/usr/local/etc/redis/redis.conf"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    healthcheck:
      # -a is used so the ping still works when requirepass is set.
      test: [ "CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: booking_prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: booking_grafana
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: booking_jaeger
    ports:
      - "16686:16686" # Web UI
      - "14268:14268" # Collector
      - "14250:14250" # GRPC
      - "4317:4317" # OTLP GRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: booking_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: booking_kafka
    ports:
      - "9092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  redis_data:
  kafka_data:
