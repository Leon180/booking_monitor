version: '3.8'

services:
  app:
    build: .
    container_name: booking_app
    command: [ "/app/booking-cli", "server" ]
    ports:
      - "6060:6060"   # pprof (only active when ENABLE_PPROF=true)
    # `unless-stopped` so a hung container caught by the HEALTHCHECK
    # below actually restarts in pure-compose envs (staging, CI). k8s
    # uses livenessProbe to do the same job; this is the docker-side
    # equivalent — without it, an `unhealthy` container stays up
    # indefinitely and nginx serves 502s with no recovery.
    restart: unless-stopped
    depends_on:
      - postgres
      - jaeger
      - kafka
      - redis
    healthcheck:
      # /livez is the unconditional process probe (always 200 if the
      # HTTP listener is up). Using it for compose's healthcheck mirrors
      # what k8s livenessProbe targets in production. /readyz would
      # also work but couples app health to dep availability — wrong
      # for liveness, right for service-mesh routing.
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost:8080/livez" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:?OTEL_EXPORTER_OTLP_ENDPOINT is required}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:?OTEL_SERVICE_NAME is required}
      - REDIS_ADDR=${REDIS_ADDR:?REDIS_ADDR is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD-}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - KAFKA_BROKERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      - GIN_MODE=${GIN_MODE:-release}
      - APP_ENV=${APP_ENV:-production}
      - GOGC=${GOGC:-100}
      - GOMEMLIMIT=${GOMEMLIMIT:-}
      - OTEL_TRACES_SAMPLER_RATIO=${OTEL_TRACES_SAMPLER_RATIO:-1}
      - ENABLE_PPROF=${ENABLE_PPROF:-false}

  nginx:
    image: nginx:1.27-alpine
    container_name: booking_nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  payment_worker:
    build: .
    container_name: booking_payment_worker
    command: [ "/app/booking-cli", "payment" ]
    # Same rationale as the `app` service: a crash or hung worker
    # should auto-restart in pure-compose envs. The worker now exposes
    # a metrics-only HTTP listener on :9091 (Phase 2 checkpoint O3),
    # which doubles as a HEALTHCHECK target — `/healthz` returns 200
    # if the process is up.
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
      - redis
    # Healthcheck targets the metrics listener's /healthz endpoint.
    # Couples liveness to the listener bind, NOT to downstream deps —
    # mirrors the app service's /livez convention. Caveat: setting
    # WORKER_METRICS_ADDR="" (used for `--once` CronJob deployments)
    # disables the listener and would cause this healthcheck to fail
    # → unhealthy → restart loop. For CronJob deployments override
    # this healthcheck (k8s livenessProbe) or remove it entirely.
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost:9091/healthz" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_ADDR=${REDIS_ADDR:?REDIS_ADDR is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD-}
      - KAFKA_BROKERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      - APP_NAME=booking_payment_worker
      - WORKER_METRICS_ADDR=${WORKER_METRICS_ADDR:-:9091}

  recon:
    # The order-status reconciler — sweeps stuck-Charging orders and
    # resolves them via gateway.GetStatus. See PROJECT_SPEC §A4.
    #
    # Default loop mode (run forever, sweep every RECON_SWEEP_INTERVAL).
    # For k8s CronJob hosting, deploy with `--once` instead and let
    # the cluster scheduler drive the cadence.
    build: .
    container_name: booking_recon
    command: [ "/app/booking-cli", "recon" ]
    restart: unless-stopped
    depends_on:
      - postgres
    # Healthcheck targets the metrics listener's /healthz endpoint.
    # Couples liveness to the listener bind, NOT to downstream deps —
    # mirrors the app service's /livez convention. Caveat: setting
    # WORKER_METRICS_ADDR="" (used for `--once` CronJob deployments)
    # disables the listener and would cause this healthcheck to fail
    # → unhealthy → restart loop. For CronJob deployments override
    # this healthcheck (k8s livenessProbe) or remove it entirely.
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost:9091/healthz" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - APP_NAME=booking_recon
      - WORKER_METRICS_ADDR=${WORKER_METRICS_ADDR:-:9091}
      # All RECON_* knobs fall back to defaults from config.go header
      # comments; override here per-deployment if production data
      # demands. See ReconConfig struct for rationale on each default.
      - RECON_SWEEP_INTERVAL=${RECON_SWEEP_INTERVAL:-120s}
      - RECON_CHARGING_THRESHOLD=${RECON_CHARGING_THRESHOLD:-120s}
      - RECON_GATEWAY_TIMEOUT=${RECON_GATEWAY_TIMEOUT:-10s}
      - RECON_MAX_CHARGING_AGE=${RECON_MAX_CHARGING_AGE:-24h}
      - RECON_BATCH_SIZE=${RECON_BATCH_SIZE:-100}

  saga_watchdog:
    # The Failed-state watchdog — sweeps orders stuck in `failed` and
    # re-drives the (idempotent) saga compensator. See PROJECT_SPEC
    # §6.7.1. Mirrors the `recon` service's shape: same default-loop
    # vs `--once` modes, same restart policy, same metrics surface.
    #
    # Added to compose in O3 (Phase 2 checkpoint): previously the
    # watchdog had no compose service and could only run via manual
    # `--once` invocations, so SagaStuckFailedOrders /
    # SagaWatchdogFindStuckErrors / SagaMaxFailedAgeExceeded alerts
    # had no producer process in the dev stack.
    build: .
    container_name: booking_saga_watchdog
    command: [ "/app/booking-cli", "saga-watchdog" ]
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    # Healthcheck targets the metrics listener's /healthz endpoint.
    # Couples liveness to the listener bind, NOT to downstream deps —
    # mirrors the app service's /livez convention. Caveat: setting
    # WORKER_METRICS_ADDR="" (used for `--once` CronJob deployments)
    # disables the listener and would cause this healthcheck to fail
    # → unhealthy → restart loop. For CronJob deployments override
    # this healthcheck (k8s livenessProbe) or remove it entirely.
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost:9091/healthz" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_ADDR=${REDIS_ADDR:?REDIS_ADDR is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD-}
      - APP_NAME=booking_saga_watchdog
      - WORKER_METRICS_ADDR=${WORKER_METRICS_ADDR:-:9091}
      # All SAGA_* knobs fall back to defaults from config.go header
      # comments; override per-deployment if production demands.
      - SAGA_WATCHDOG_INTERVAL=${SAGA_WATCHDOG_INTERVAL:-60s}
      - SAGA_STUCK_THRESHOLD=${SAGA_STUCK_THRESHOLD:-60s}
      - SAGA_MAX_FAILED_AGE=${SAGA_MAX_FAILED_AGE:-24h}
      - SAGA_BATCH_SIZE=${SAGA_BATCH_SIZE:-100}

  postgres:
    image: postgres:15-alpine
    container_name: booking_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    command: -c 'max_connections=1000'

  redis:
    image: redis:7-alpine
    container_name: booking_redis
    ports:
      - "6379:6379"
    volumes:
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    # requirepass is passed as a command-line arg so the secret stays
    # in .env, never in the baked config file. The entrypoint still
    # loads redis.conf for persistence / memory settings.
    command:
      - "redis-server"
      - "/usr/local/etc/redis/redis.conf"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    healthcheck:
      # -a is used so the ping still works when requirepass is set.
      test: [ "CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: booking_prometheus
    # Mount the whole deploy/prometheus/ directory (not just prometheus.yml)
    # so `rule_files: - "alerts.yml"` in prometheus.yml resolves. Previously
    # only prometheus.yml was mounted, which silently disabled every alert
    # rule (including the InventorySoldOut fix from C6). Caught during the
    # PR #8 smoke test.
    volumes:
      - ./deploy/prometheus:/etc/prometheus:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: booking_grafana
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: booking_jaeger
    ports:
      - "16686:16686" # Web UI
      - "14268:14268" # Collector
      - "14250:14250" # GRPC
      - "4317:4317" # OTLP GRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: booking_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: booking_kafka
    ports:
      - "9092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  redis_data:
  kafka_data:
