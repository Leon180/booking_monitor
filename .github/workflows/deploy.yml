# GitHub Actions deploy workflow — PR 5 of the 8-PR CI/CD roadmap.
#
# Triggers a deploy of a signed image to the GCE VM via IAP tunnel SSH.
# Auth uses Workload Identity Federation (PR 1) — no long-lived
# credentials in this workflow.
#
# Verification chain (defense in depth):
#   1. `gh attestation verify` — canonical GitHub-native verifier
#      for `actions/attest-build-provenance@v4` attestations
#      (https://docs.github.com/actions/security-for-github-actions/
#      using-artifact-attestations).
#   2. `cosign verify` — cross-checks the image signature against
#      the same identity-regex enforced in PR 3's release.yml smoke
#      test + PR 4's deploy.sh. Both paths must agree.
#   3. `scripts/deploy.sh` itself re-runs `cosign verify-attestation`
#      before touching the VM — duplicated by design (different
#      threat models: CI-side catches "image was never signed";
#      deploy.sh catches "I'm being invoked with a forged digest").
#
# Deploy markers go to GitHub Deployments API (native, free, gives
# repo "Deployments" tab + audit trail). PR 7 (DORA dashboard) will
# pull from this. We deliberately do NOT use Prometheus Pushgateway
# (Prometheus docs explicitly warn against using it as an event log)
# or Grafana annotations (niche pattern, <5% production usage).
#
# Concurrency `cancel-in-progress: false` queues at most one
# pending deploy. Rapid tag pushes (v1.0.1 → v1.0.2 → v1.0.3 while
# v1.0.1 is mid-deploy) will deploy v1.0.3 directly; v1.0.2 is
# dropped from the queue. SAFE for our golang-migrate forward-only
# model — v1.0.3 includes v1.0.2's migrations. Document loud
# rationale here so a reviewer doesn't "fix" it by switching to
# `cancel-in-progress: true`.

name: Deploy

on:
  # Tag-triggered: the canonical "ship to prod" decision. NOT
  # `push: branches: [main]` — that conflates "merged" with
  # "deployed" and breaks the audit story.
  push:
    tags: ["v*"]
  # Manual hotfix lane — explicit image_tag input so the operator
  # can deploy a previously-built digest without re-tagging.
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v1.0.0, sha-abc1234)"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

# CRIT-C1 fix (review round 1): deploy.sh reads `$GCP_ARTIFACT_REGISTRY`
# (not `$REGISTRY`). The workflow MUST export the same name, otherwise
# deploy.sh silently falls back to its hardcoded default which may not
# match the actual AR repo (region / repo-id drift between operator and
# CI). Both names exposed: REGISTRY for in-workflow shell + GCP_ARTIFACT_
# REGISTRY for the deploy.sh subshell.
env:
  GCP_ARTIFACT_REGISTRY: ${{ vars.GCP_ARTIFACT_REGISTRY }}
  REGISTRY: ${{ vars.GCP_ARTIFACT_REGISTRY }}
  IMAGE_NAME: booking-monitor

jobs:
  deploy:
    name: deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # `environment: production` gates the job on GH branch protection
    # rules + optional required reviewers (set this up in the repo
    # settings). Also surfaces in the Deployments tab UI.
    environment:
      name: production
      # CRIT-C2 fix (PR #151 review round 1): when PUBLIC_HOST is empty
      # (soft-skip mode), the URL would resolve to `https:///` and
      # pollute the GH Deployments tab with malformed entries — each
      # deployment record is IMMUTABLE, so this would corrupt PR #144's
      # DORA dashboard data. The conditional expression returns the
      # full URL when configured, empty string when not, which GH
      # treats as "no env URL".
      url: ${{ vars.PUBLIC_HOST != '' && format('https://{0}/', vars.PUBLIC_HOST) || '' }}
    permissions:
      contents: read
      id-token: write # WIF auth + sigstore OIDC
      # `attestations: read` is REQUIRED for `gh attestation verify`.
      # PR 5 review round 1 incorrectly removed this thinking it
      # wasn't honored — first end-to-end run on v1.3.0 tag failed
      # with "the provided token was denied access to the requested
      # resource". Restored. See
      # https://docs.github.com/en/actions/security-for-github-actions/
      # security-guides/automatic-token-authentication
      attestations: read
      deployments: write # GitHub Deployments API
    outputs:
      digest: ${{ steps.digest.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 0. Soft-skip guard: if PUBLIC_HOST repo variable is unset, the
      # CD pipeline isn't fully configured (tunnel + DNS missing). Mark
      # this run as skipped-with-explanation instead of failing red.
      #
      # Architectural finding (2026-06-01 deep-dive): e2-micro Always-
      # Free tier (1 GB RAM) can't fit the full compose stack (~1.5 GB
      # committed: kafka + zookeeper + jaeger + postgres + redis + app +
      # 3 sweeper sidecars). Validated empirically — booking_kafka /
      # booking_app / booking_nginx never started; VM OOM-thrashed.
      # See docs/runbooks/deploy.md § Tier ceiling.
      #
      # Until the tier constraint is resolved (resize to e2-small ~$13/
      # mo OR migrate to GKE Autopilot per docs/k8s-migration-plan.md),
      # deploy.yml stays in soft-skip mode. The architecture is wired;
      # only the live target is missing.
      - name: Check CD configuration
        id: cd_guard
        run: |
          if [ -z "${{ vars.PUBLIC_HOST }}" ]; then
            echo "::notice title=CD soft-skip::PUBLIC_HOST repo variable is unset — CD configuration incomplete. See docs/runbooks/cd_completion_checklist.md. This run will exit cleanly without attempting deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Soft-skip notice (PUBLIC_HOST unset)
        if: steps.cd_guard.outputs.skip == 'true'
        run: |
          echo "✓ CD pipeline architecture is wired but live target is not configured."
          echo ""
          echo "To complete CD setup, see docs/runbooks/cd_completion_checklist.md."
          echo "Once PUBLIC_HOST is set as a repo variable, subsequent tag pushes"
          echo "will run the full chain (verify attestations + ssh-deploy + smoke)."

      # ------------------------------------------------------------------
      # 1. Resolve which tag we're deploying.
      # ------------------------------------------------------------------
      - name: Resolve image tag
        # CRIT-C1 fix (PR #151 review round 1): without this gate, a
        # workflow_dispatch run with PUBLIC_HOST empty would resolve the
        # tag, exit the workflow with conclusion=success (because no
        # subsequent step ran or failed), and mislead the operator into
        # thinking they deployed. Gate this step so the soft-skip path
        # exits cleanly without ANY downstream work.
        if: steps.cd_guard.outputs.skip != 'true'
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Sanity-check: tag must be non-empty and match SemVer (incl.
          # pre-release + build metadata per semver.org) OR sha-<hex>
          # pattern. MAJOR I1 fix (review round 1): the previous regex
          # rejected `v1.0.0-rc1` / `v1.0.0+build.5`, which PR 3's
          # release.yml DOES produce for dry-runs. Standard semver shape
          # per https://semver.org §10.
          if ! echo "$TAG" | grep -qE '^(v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?|sha-[a-f0-9]{7,40})$'; then
            echo "✗ tag '$TAG' doesn't match v<semver>[-prerelease][+build] or sha-<hex7-40>"
            exit 1
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy tag: $TAG"

      # ------------------------------------------------------------------
      # 2. Auth to GCP via WIF. Same pattern as release.yml — repo
      # variables `GCP_WORKLOAD_IDENTITY_PROVIDER` + `GCP_CI_DEPLOY_SA`
      # are set by PR 1's terraform.
      # ------------------------------------------------------------------
      - name: Authenticate to GCP (Workload Identity Federation)
        if: steps.cd_guard.outputs.skip != 'true'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_DEPLOY_SA }}

      - name: Install cosign
        if: steps.cd_guard.outputs.skip != 'true'
        uses: sigstore/cosign-installer@v4.1.2

      # ------------------------------------------------------------------
      # 2.5. Create GitHub Deployment (in_progress) EARLY — before
      # digest/verify steps. MAJOR-M1 fix (review round 1): the
      # previous order created the Deployment record AFTER all
      # verification + just before deploy.sh. If digest lookup or
      # attestation verify failed, no Deployment record existed, so
      # the `if: failure()` step at the end skipped its update —
      # leaving DORA-dashboard ingestion blind to the failure.
      # Creating the record early makes every deploy attempt visible,
      # including those that fail before reaching the VM.
      # ------------------------------------------------------------------
      - name: Create GitHub Deployment (in_progress)
        if: steps.cd_guard.outputs.skip != 'true'
        id: gh_deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # CRIT-C3 fix (PR 5 round 1): jq pipes JSON via --input - so
        # `required_contexts: []` is a real empty array, not the
        # string "[]". Empty array intentional — the job-level
        # `environment: production` gates required reviewers / tag
        # restrictions in the GH UI.
        run: |
          DEPLOYMENT_ID=$(jq -n \
              --arg ref '${{ github.sha }}' \
              --arg env 'production' \
              --arg desc 'Deploy ${{ steps.tag.outputs.value }} (digest pending verification)' \
              '{ref: $ref, environment: $env, description: $desc, auto_merge: false, required_contexts: [], production_environment: true}' \
            | gh api -X POST "/repos/${{ github.repository }}/deployments" \
                --input - --jq '.id')
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "✗ failed to create GitHub Deployment"
            exit 3
          fi
          echo "id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          gh api -X POST "/repos/${{ github.repository }}/deployments/${DEPLOYMENT_ID}/statuses" \
            -f state=in_progress \
            -f description='Verifying image attestations' \
            -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null
          echo "✓ Created deployment ${DEPLOYMENT_ID}"

      # ------------------------------------------------------------------
      # 3. Resolve tag → immutable digest. Deploy by digest (not tag)
      # to avoid tag-mutation races; the same digest is what every
      # verifier checks against.
      # ------------------------------------------------------------------
      - name: Resolve image digest
        if: steps.cd_guard.outputs.skip != 'true'
        id: digest
        # PR 6 retry-with-backoff: this workflow + release.yml race
        # on the same `push: tags: ['v*']` event. release.yml has
        # TWO sequential jobs (build → attest); typical wall-clock
        # 4-7 min (Trivy DB pull on cold runs can hit 7 min). 36
        # attempts × 10s = 6 min covers P99 image-availability.
        #
        # CRIT-C1 fix (review round 1): the original 3-min budget
        # was too tight — release.yml's BUILD job alone is 3-5 min;
        # bump to 6 min to absorb tail-latency.
        #
        # NOTE: this step only waits for the IMAGE to be pushed.
        # The ATTESTATION lands later in release.yml's attest job.
        # Steps 4a/4b below have their own retry loops for that.
        run: |
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${{ steps.tag.outputs.value }}"
          DIGEST=""
          for attempt in $(seq 1 36); do
            DIGEST=$(gcloud artifacts docker images describe "$IMAGE_REF" \
              --format='value(image_summary.digest)' 2>/dev/null) || DIGEST=""
            if [ -n "$DIGEST" ]; then
              echo "✓ ${IMAGE_REF} found at attempt ${attempt}"
              break
            fi
            if [ "$attempt" = "36" ]; then
              echo "✗ image not found in registry after 36 attempts (~6 min): $IMAGE_REF"
              echo "  Likely cause: release.yml (build+sign) failed or is taking unusually long."
              echo "  Check: gh run list --workflow=release.yml --limit=1"
              exit 2
            fi
            echo "  attempt ${attempt}/36: image not yet published, retry in 10s..."
            sleep 10
          done
          {
            echo "ref=$IMAGE_REF"
            echo "digest=$DIGEST"
            echo "by_digest=${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
          } >> "$GITHUB_OUTPUT"
          echo "✓ ${IMAGE_REF} → ${DIGEST}"

      # ------------------------------------------------------------------
      # 4a. Canonical verifier: gh attestation verify.
      # `actions/attest-build-provenance@v4` stores attestations in
      # GitHub's native store. `--signer-workflow` pins the producer
      # workflow so a malicious push to `evil.yml` (with id-token:write)
      # in the same repo can't forge a valid attestation.
      # ------------------------------------------------------------------
      - name: Verify SLSA provenance (gh attestation verify)
        if: steps.cd_guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # CRIT-C2 fix (review round 1): release.yml's attest job runs
        # AFTER its build job, so the image is queryable (step 3 above
        # succeeds) BEFORE the SLSA attestation is attached. Without a
        # retry here, deploy.yml's first run after a release-please
        # tag push fails with "no attestations found". 18 × 10s = 3 min
        # is enough — GitHub's attestation store becomes queryable
        # within seconds of `actions/attest-build-provenance` returning,
        # so this loop only absorbs the gap between build job complete
        # and attest job complete (1-2 min).
        run: |
          for attempt in $(seq 1 18); do
            if gh attestation verify \
                "oci://${{ steps.digest.outputs.by_digest }}" \
                --repo "${{ github.repository }}" \
                --signer-workflow "${{ github.repository }}/.github/workflows/release.yml" 2>/tmp/att.err; then
              echo "✓ SLSA provenance verified via GitHub attestation store (attempt ${attempt})"
              break
            fi
            if [ "$attempt" = "18" ]; then
              echo "✗ gh attestation verify failed after 18 attempts (~3 min)"
              echo "  Last error:"
              sed 's/^/    /' /tmp/att.err
              exit 6
            fi
            echo "  attempt ${attempt}/18: attestation not yet queryable, retry in 10s..."
            sleep 10
          done

      # ------------------------------------------------------------------
      # 4b. Cross-check: cosign verify against the same Fulcio identity.
      # Both verifiers must agree. If they diverge, abort — likely a
      # tampered attestation store OR a tampered registry.
      # ------------------------------------------------------------------
      - name: Verify image signature (cosign cross-check)
        if: steps.cd_guard.outputs.skip != 'true'
        # PR 5 review round 1 (CRIT-C2): tightened `tags/v.*` to
        # `tags/v[0-9][^/]*` so the regex rejects tag names containing
        # `/` (git allows slashes in tag refs like `v1.0.0/hotfix`).
        #
        # PR 6 review round 1 (CRIT-C2 again, different race): cosign
        # verify checks Rekor inclusion-proof by default. Rekor
        # propagation after signing is 30s-2min. Retry-with-backoff
        # absorbs that gap. 18 × 10s = 3 min, identical budget to the
        # gh attestation verify step above (both wait on the same
        # attest job's signing completion + Rekor publish).
        run: |
          IDENTITY_REGEX="^https://github\.com/${{ github.repository }}/\.github/workflows/release\.yml@refs/(heads/main|tags/v[0-9][^/]*)$"
          for attempt in $(seq 1 18); do
            if cosign verify \
                --certificate-identity-regexp "$IDENTITY_REGEX" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                "${{ steps.digest.outputs.by_digest }}" > /dev/null 2>/tmp/cosign.err; then
              echo "✓ Image signature verified via cosign (attempt ${attempt})"
              break
            fi
            if [ "$attempt" = "18" ]; then
              echo "✗ cosign verify failed after 18 attempts (~3 min)"
              echo "  Last error:"
              sed 's/^/    /' /tmp/cosign.err
              exit 7
            fi
            echo "  attempt ${attempt}/18: signature/Rekor not yet ready, retry in 10s..."
            sleep 10
          done

      # ------------------------------------------------------------------
      # 5. Update Deployment status — verification complete, deploying.
      # (The Deployment record itself was created in step 2.5 — see
      # MAJOR-M1 rationale there.)
      # ------------------------------------------------------------------
      - name: Update Deployment — verification complete
        if: steps.cd_guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/deployments/${{ steps.gh_deployment.outputs.id }}/statuses" \
            -f state=in_progress \
            -f description='Image verified (${{ steps.digest.outputs.digest }}); running deploy.sh on VM' \
            -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null

      # ------------------------------------------------------------------
      # 6. Run the deploy script. Same script PR 4 ships for operators
      # — we reuse it verbatim so CI + manual deploys stay identical.
      # Env vars override deploy.sh's defaults to point at the actual
      # project / zone / VM.
      # ------------------------------------------------------------------
      - name: Run deploy.sh
        if: steps.cd_guard.outputs.skip != 'true'
        # MAJOR M2/I3 fix (review round 1): forward EVERY env var
        # deploy.sh reads (not just PROJECT_ID/ZONE/VM_NAME). Without
        # this, a fork or alt-deployment uses the script's hardcoded
        # defaults (`/opt/booking-monitor`, Leon180's repo URL), silently
        # diverging operator-mode and CI-mode behavior. Repo variables
        # with `vars.*` fallback so callers don't need to set every one.
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          ZONE: ${{ vars.GCP_VM_ZONE }}
          VM_NAME: ${{ vars.GCP_VM_NAME }}
          # GCP_ARTIFACT_REGISTRY already exported workflow-wide above.
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VM_PROJECT_DIR: ${{ vars.VM_PROJECT_DIR }}
          REPO_URL: ${{ vars.REPO_URL }}
        run: bash scripts/deploy.sh "${{ steps.tag.outputs.value }}"

      # ------------------------------------------------------------------
      # 7. External smoke test through Cloudflare Tunnel.
      # CRITICAL: this hits the PUBLIC FQDN, not localhost on the VM.
      # Catches cloudflared misconfig / tunnel cred / DNS issues that
      # VM-local probes would miss.
      # Retry with backoff because cloudflared can need a few seconds
      # to bind the new container's healthcheck endpoint after restart.
      # ------------------------------------------------------------------
      - name: External smoke test (Cloudflare Tunnel → nginx → app)
        if: steps.cd_guard.outputs.skip != 'true'
        # MAJOR I5 + m3 fix (review round 1):
        #   * bump retry window 60s → 120s to match deploy.sh's
        #     `docker compose up --wait --wait-timeout 120` — Kafka can
        #     take ~30s to be consumer-ready after compose-up, PG ~10s
        #     cold start, app waits on both via /readyz.
        #   * on probe failure print the response body + HTTP status
        #     (/readyz returns per-dep JSON, exactly the diagnostic
        #     a runbook reader wants visible in the run log) instead
        #     of swallowing it with `2>/dev/null`.
        run: |
          HOST="${{ vars.PUBLIC_HOST }}"
          if [ -z "$HOST" ]; then
            echo "✗ PUBLIC_HOST repo variable not set"
            exit 4
          fi
          for attempt in $(seq 1 60); do
            HTTP_STATUS=$(curl -sS --max-time 5 -o /tmp/readyz.body -w '%{http_code}' \
                          "https://${HOST}/readyz" || echo 000)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✓ /readyz returned 200 (attempt ${attempt})"
              break
            fi
            if [ "$attempt" = "60" ]; then
              echo "✗ /readyz never returned 200 after 60 attempts (~120s)"
              echo "  last HTTP status: $HTTP_STATUS"
              echo "  last response body:"
              sed 's/^/    /' /tmp/readyz.body
              exit 5
            fi
            sleep 2
          done
          # Sanity-print /livez too — distinct probe semantics
          curl -fsS --max-time 5 "https://${HOST}/livez" > /dev/null
          echo "✓ /livez returned 200"

      # ------------------------------------------------------------------
      # 8a. Mark deployment success.
      # ------------------------------------------------------------------
      - name: Mark deployment success
        if: success() && steps.cd_guard.outputs.skip != 'true' && steps.gh_deployment.outputs.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/deployments/${{ steps.gh_deployment.outputs.id }}/statuses" \
            -f state=success \
            -f description="Deployed ${{ steps.tag.outputs.value }} (${{ steps.digest.outputs.digest }})" \
            -f environment_url="https://${{ vars.PUBLIC_HOST }}/" \
            -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null
          echo "✓ Marked deployment ${{ steps.gh_deployment.outputs.id }} success"

      # ------------------------------------------------------------------
      # 8b. Mark deployment failure (any failure in steps 6/7).
      # `if: failure()` runs only when an earlier step failed; combined
      # with the id guard so we don't post-status to a non-existent
      # deployment (e.g. if step 5 itself failed).
      # ------------------------------------------------------------------
      - name: Mark deployment failure
        if: failure() && steps.gh_deployment.outputs.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/deployments/${{ steps.gh_deployment.outputs.id }}/statuses" \
            -f state=failure \
            -f description="Deploy failed — see workflow logs" \
            -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > /dev/null
          echo "✓ Marked deployment ${{ steps.gh_deployment.outputs.id }} failure"
