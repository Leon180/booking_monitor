# GitHub Actions CI — Phase 2 of senior-grade resilience roadmap
#
# Why these jobs and not others:
#   * test    — unit tests with -race. Race detector loves CI: races
#               are non-deterministic and only surface in volume.
#               Local runs are too rare to catch them; nightly + per-PR
#               CI is the right cadence (Go runtime team's own advice).
#   * lint    — golangci-lint v2; config in .golangci.yml. Conservative
#               set (errcheck, govet, staticcheck, ineffassign, gosec,
#               revive) — see .golangci.yml header for ratchet rationale.
#   * vuln    — govulncheck. Different from gosec: govulncheck maps
#               known CVEs in go.sum to actual call paths, so a vuln
#               in a transitively-imported package only fails CI when
#               we actually call the affected function. Catches new
#               CVEs the day they're published.
#   * build   — build the Docker image. Pure correctness gate that the
#               full multi-stage build succeeds; doesn't push anywhere.
#
# Trade-offs deliberately taken:
#   * No matrix on Go version. The codebase pins go 1.25 in go.mod;
#     supporting "1.24 or newer" silently would mask version-pinning
#     drift. When we move to 1.26, we update go.mod AND this file —
#     the coupling is the feature.
#   * No coverage gate (yet). Coverage is uploaded as an artifact for
#     review, but `go test -cover` thresholds reward gaming over real
#     test quality. N6 (test infra hardening) revisits this.
#   * No Codecov / SonarCloud. External dashboards add a deploy-time
#     dep and an account; the artifact is sufficient for the portfolio
#     scope.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch — saves CI minutes when
# you push a fixup before the previous run finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default minimal permissions — security scanners can request
# `security-events: write` per-job if they want to upload SARIF.
permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  test:
    name: test (race)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # actions/setup-go@v5 caches build + module dirs by default
          # via the lockfile (go.sum). Hits ~80% on warm runs.
          cache: true

      - name: Download deps
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test -race -coverprofile
        # ./internal/... matches the project's `make test` scope. The
        # cmd/ binary is a thin fx-DI bootstrap — covered transitively
        # via integration tests (PR N8 will add a dedicated suite).
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./internal/...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 14

  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false # the action below maintains its own lint cache

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0
          # only-new-issues lets CI flag NEW lint findings on PRs
          # without forcing the PR to also clean up pre-existing
          # issues outside its scope. Set false on `main` so we
          # always have a clean baseline of zero findings.
          only-new-issues: false
          args: --timeout=5m

  vuln:
    name: govulncheck (supply chain)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Scans go.sum vs the vuln DB and only fails when the binary
        # actually CALLS a vulnerable symbol (not just imports the
        # package). Lower false-positive rate than naive SCA tools.
        run: govulncheck ./...

  test-integration:
    name: test-integration (testcontainers)
    runs-on: ubuntu-latest
    # Docker pull + container boot per test → 9min budget covers the
    # full suite plus retries.
    #
    # Sizing: suite has grown to ~75 top-level tests each booting its
    # own postgres:15-alpine container (~3-5s each on CI runners) →
    # ~300s wall-clock. The original 5m limit was sized for ~43 tests;
    # PR-A saga_compensation_test.go pushed past that threshold.
    # Long-term fix: one-container-per-package via TestMain (boot cost
    # amortises to ~2s regardless of test count + explicit Reset
    # discipline) — tracked as a dedicated refactor PR.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download deps
        run: go mod download

      - name: Pre-pull postgres image
        # Pre-pull cuts perceived latency: testcontainers-go would do
        # this lazily on first test; pulling here makes the per-test
        # docker pull a no-op (image already in cache) and any pull
        # failure surfaces as its own clean failure mode separate from
        # a test failure.
        run: docker pull postgres:15-alpine

      - name: go test -tags=integration -race
        # ./test/integration/... is the dedicated integration scope.
        # The build tag gates this suite from the unit-test job's
        # ./internal/... scope so unit-test runs stay container-free.
        run: |
          go test -tags=integration -race -timeout 9m ./test/integration/...

  hadolint:
    name: hadolint (Dockerfile)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint
        # PR 2 — lint the Dockerfile for common antipatterns (unpinned base
        # image, root user in final stage, `apt-get install` without cleanup,
        # COPY without --chown in distroless, etc.). Conservative ruleset:
        # we don't fail on info-level warnings yet, only error-level.
        # Tighten via `failure-threshold: warning` once the baseline is clean.
        #
        # Ignore rules configured in .hadolint.yaml at repo root so local
        # `make docker-lint` and this CI step share one source of truth.
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  build:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip docker build until hadolint passes — saves CI minutes on
    # PRs that break the Dockerfile syntactically.
    needs: hadolint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute build identity
        id: ident
        # PR 2 — inject canonical build-args so the resulting image
        # carries correct OCI labels + ldflags-injected binary version.
        # github.sha is the head commit; for tagged releases this will
        # match the tag's commit. github.run_id added as a tiebreaker
        # for non-tagged builds (so two builds at the same commit can
        # still be distinguished).
        run: |
          echo "commit_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          # Use ref_name for tags (v1.2.3), or short SHA + run_id for branches.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(echo ${{ github.sha }} | cut -c1-7)-r${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (no push)
        # Build the multi-stage Dockerfile end-to-end. We don't push
        # anywhere — pushing belongs in a separate release workflow
        # gated on tags (PR 3). Failure here means the image stage is
        # broken, which our local `make build` would not have caught.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            COMMIT_SHA=${{ steps.ident.outputs.commit_sha }}
            BUILD_DATE=${{ steps.ident.outputs.build_date }}
            VERSION=${{ steps.ident.outputs.version }}
          # GHA cache backend: fast incremental rebuilds across CI runs
          # without polluting any container registry.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single-arch (amd64) for now — multi-arch adds 2-3× build
          # time and we don't ship images yet. Add arm64 when the
          # release workflow lands (PR 3).
          # Load the image into the runner so the next step can inspect.
          load: true
          tags: booking-monitor:ci-${{ github.run_id }}

      - name: Verify image hardening
        # PR 2 — assert the built image actually has the labels + user
        # we documented. Catches future Dockerfile edits that silently
        # break OCI labels (e.g. LABEL directive moved to a stage that
        # gets discarded by multi-stage build).
        run: |
          IMAGE="booking-monitor:ci-${{ github.run_id }}"
          echo "=== OCI labels ==="
          docker inspect "$IMAGE" --format='{{json .Config.Labels}}' | jq .
          echo "=== Runtime config ==="
          docker inspect "$IMAGE" --format='USER={{.Config.User}} ENTRYPOINT={{.Config.Entrypoint}}'
          # Fail if any required label is missing.
          for lbl in source revision created version title; do
            val=$(docker inspect "$IMAGE" --format="{{index .Config.Labels \"org.opencontainers.image.${lbl}\"}}")
            if [ -z "$val" ] || [ "$val" = "<no value>" ]; then
              echo "❌ Missing required OCI label: org.opencontainers.image.${lbl}"
              exit 1
            fi
            echo "✓ org.opencontainers.image.${lbl} = $val"
          done
          # Fail if running as root.
          user=$(docker inspect "$IMAGE" --format='{{.Config.User}}')
          if [ "$user" = "" ] || [ "$user" = "0" ] || [ "$user" = "root" ] || [ "$user" = "0:0" ]; then
            echo "❌ Image runs as root (Config.User='$user')"
            exit 1
          fi
          echo "✓ Image runs as non-root: $user"
