# GitHub Actions — release workflow (PR 3, supply-chain hardened).
#
# Triggered on push to main + version tags. Does the full chain:
#   1. Build the production image (uses PR 2's hardened Dockerfile)
#   2. Trivy CVE scan — gate before publish
#   3. Push to GCP Artifact Registry (auth via PR 1's WIF)
#   4. SLSA L3 build provenance via actions/attest-build-provenance
#      (GitHub-native; runs in isolated runner satisfying SLSA L3
#      "signing key isolated from user code" requirement)
#   5. SBOM (SPDX-JSON) via Syft + cosign attest
#   6. Cosign verify smoke test before declaring release good
#
# The CI workflow (.github/workflows/ci.yml) still runs `docker build`
# without push on every PR — that's the fast PR-time correctness gate.
# This release workflow only runs on main/tag and is the publication
# pipeline.
#
# Pre-merge checklist for the operator (one-time):
#   * Apply PR 1's Terraform to your GCP project:
#       cd deploy/terraform && make apply
#   * Set GH Actions repository variables from `terraform output`:
#       GCP_WORKLOAD_IDENTITY_PROVIDER
#       GCP_CI_DEPLOY_SA
#       GCP_ARTIFACT_REGISTRY        (e.g. us-central1-docker.pkg.dev/<proj>/booking)
#   * Push a test tag (e.g. v0.0.0-rc1) and verify the run is fully green
#
# Verification design choice (per Topic 3 fact-check):
# Switched FROM `slsa-framework/slsa-github-generator` TO
# `actions/attest-build-provenance@v4.1.0`. Both achieve SLSA L3, but
# the GitHub-native action lets us own the DAG (insert Trivy gate
# before push). The reusable workflow approach bundled build+push+
# provenance into one job, locking out per-step controls.

name: release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to release (defaults to current)'
        required: false
        default: ''

# Disable concurrent releases on the same ref — pushing/signing the
# same image from concurrent runs would race. Tag pushes are
# inherently serialized (one tag = one ref); main pushes can stack
# but we want them queued, not cancelled, so finished publishes are
# attested.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default minimal permissions. Per-job overrides expand explicitly
# where needed (id-token for OIDC, attestations for provenance).
permissions:
  contents: read

env:
  # GCP_ARTIFACT_REGISTRY shape: <region>-docker.pkg.dev/<project>/<repo>
  # Example: us-central1-docker.pkg.dev/booking-monitor-sandbox/booking
  REGISTRY: ${{ vars.GCP_ARTIFACT_REGISTRY }}
  IMAGE_NAME: booking-monitor

jobs:
  # ===========================================================================
  # build: produce hardened image + Trivy gate + push to AR
  # ===========================================================================
  build:
    name: build + scan + push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # GCP WIF auth — exchanges GH OIDC for GCP token
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        id: auth
        # PR 1 provisioned the WIF pool + provider + deploy SA. We
        # pass the OIDC JWT to GCP STS and receive a short-lived
        # GCP access token. No long-lived service-account key
        # anywhere in this workflow.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_DEPLOY_SA }}

      - name: Configure docker for Artifact Registry
        # `gcloud auth configure-docker` writes ~/.docker/config.json with
        # a credential helper entry for the AR host. Subsequent `docker
        # push` calls use the credentials minted by the auth step above.
        run: |
          gcloud auth configure-docker \
            "$(echo '${{ env.REGISTRY }}' | cut -d'/' -f1)" \
            --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Compute image tags + build identity
        id: meta
        # Compute ONCE upfront so build + push steps see the same
        # commit_sha/build_date/version. Otherwise BUILD_DATE drifts
        # between local build and push, breaking reproducibility.
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          # Tag list — always include sha-prefixed for traceability.
          # Tags get :v* + :latest; main pushes get :main + :sha-<short>.
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${SHORT_SHA}"
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "${IMAGE}:${{ github.ref_name }}"
              echo "${IMAGE}:latest"
            else
              echo "${IMAGE}:main"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Build identity for OCI labels + ldflags injection.
          echo "commit_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image (no push — Trivy gate next)
        id: build
        # Build locally first so Trivy can scan the actual layers
        # before we publish. `load: true` puts the image in the
        # runner's docker daemon for scanning.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.commit_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy CVE scan — gate publish on HIGH/CRITICAL
        # `--exit-code 1` fails CI if any HIGH or CRITICAL CVE is found.
        # `--ignore-unfixed` excludes vulns without a known fix (so we
        # don't block on noise that we can't action against). Adjust
        # threshold by env var if needed.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.meta.outputs.commit_sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          # vuln-type defaults to os,library — covers both Alpine apk and Go deps.

      - name: Push to Artifact Registry (Trivy passed)
        id: push
        # Re-uses the BuildKit cache from the previous build step, so
        # this is fast (~few seconds). Sets push=true and outputs the
        # registry-side digest, which is what we attest against in the
        # next job.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.commit_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          provenance: false
          # provenance: false here — the build-push-action's built-in
          # BuildKit provenance is a different, lower-SLSA-level thing
          # than what `actions/attest-build-provenance` emits. We
          # intentionally suppress to avoid confusion in `cosign tree`.

  # ===========================================================================
  # attest: SLSA L3 build provenance + SBOM, cryptographically signed
  # ===========================================================================
  attest:
    name: attest (SLSA L3 + SBOM)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # OIDC for Sigstore (cosign) + GCP WIF
      attestations: write # Required by actions/attest-build-provenance
      packages: write # Required even when not pushing to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        # Need GCP auth again — attestations push to AR alongside image.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_DEPLOY_SA }}

      - name: Configure docker for Artifact Registry
        run: |
          gcloud auth configure-docker \
            "$(echo '${{ env.REGISTRY }}' | cut -d'/' -f1)" \
            --quiet

      # -----------------------------------------------------------------------
      # SLSA L3 BUILD PROVENANCE
      # actions/attest-build-provenance runs in an isolated GitHub-managed
      # runner that satisfies SLSA L3 "signing key isolated from user code"
      # requirement. The user workflow (this file) never sees the signing
      # key — GitHub's infra signs the provenance via Sigstore Fulcio +
      # Rekor and pushes the in-toto attestation to the registry next to
      # the image. Verification later: `cosign verify-attestation
      # --type slsaprovenance1 ...`
      # -----------------------------------------------------------------------
      - name: Generate + attach SLSA L3 build provenance
        id: provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ needs.build.outputs.image }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true

      # -----------------------------------------------------------------------
      # SBOM (Software Bill of Materials) via Syft
      # SPDX-JSON format — Linux Foundation standard, ISO/IEC 5962:2021.
      # CycloneDX is the alternative; format choice is largely consumer-
      # driven and most tools accept both in 2026. We use SPDX for OCI
      # registry + cosign integration ergonomics.
      # -----------------------------------------------------------------------
      - name: Install Syft + Cosign
        run: |
          # Syft: install latest via official script (signed via cosign)
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft --version

          # Cosign: install via official action for version pin
      - uses: sigstore/cosign-installer@v3.7.0

      - name: Generate SBOM (SPDX-JSON)
        run: |
          syft "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}" \
            -o spdx-json=sbom.spdx.json
          # Sanity-print: number of packages cataloged
          echo "Packages in SBOM: $(jq '.packages | length' sbom.spdx.json)"

      - name: Attest SBOM via cosign keyless
        # Uses the GH Actions OIDC token automatically. The SBOM becomes
        # an in-toto attestation pushed to the registry next to the image.
        # `--type spdxjson` is the predicate-type identifier per Sigstore
        # cosign enum (other types: slsaprovenance1, cyclonedx, openvex).
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}"

      # -----------------------------------------------------------------------
      # Smoke test: verify both attestations are discoverable and valid.
      # Catches misconfiguration before the release is declared good.
      # -----------------------------------------------------------------------
      - name: Verify SLSA + SBOM attestations (smoke test)
        # The certificate-identity-regexp must match the OIDC subject
        # GitHub stamped onto the signing cert. For actions/attest-*
        # this is `<repo>/.github/workflows/release.yml@<ref>` —
        # we accept either main branch or v-tag refs.
        run: |
          IMAGE="${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}"

          echo "=== Verify SLSA build provenance ==="
          cosign verify-attestation \
            --type slsaprovenance1 \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE" > /dev/null
          echo "✓ SLSA provenance attestation verified"

          echo "=== Verify SBOM attestation ==="
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE" > /dev/null
          echo "✓ SBOM attestation verified"

          echo ""
          echo "=== Discover all attestations attached to image ==="
          cosign tree "$IMAGE"
